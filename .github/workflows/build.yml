name: Build and Generate SBOM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Generate CycloneDX SBOM
        run: |
          curl -L -o cyclonedx-sbom-generator.zip https://github.com/CycloneDX/cyclonedx-cli/releases/latest/download/cyclonedx-cli.zip
          unzip cyclonedx-sbom-generator.zip
          ./cyclonedx-sbom-generator generate -o sbom.xml

      - name: Build Project
        run: |
          dotnet build src/BlazingApple.Forums/BlazingApple.Forums.sln

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.xml

      - name: Notify Build Failure
        if: failure()
        run: echo 'Build failed, but SBOM has been uploaded.'
