# This is the modified build workflow

name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '5.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Generate CycloneDX SBOM
        # Using cdxgen to capture both NuGet and any client-side JS dependencies
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t dotnet -o cyclonedx-sbom.json

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-sbom
          path: cyclonedx-sbom.json
          retention-days: 90
